<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <title>Gridlock - A Parking Puzzle</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      touch-action: none;
    }

    .header {
      text-align: center;
      padding: 24px 16px 12px;
    }
    .header img { margin-bottom: 6px; }
    .header h1 {
      font-size: 32px;
      color: #fff;
      letter-spacing: 4px;
    }
    .header p {
      color: #888;
      font-size: 14px;
      margin-top: 2px;
    }

    .game-wrapper {
      position: relative;
      margin: 12px 0;
      width: 800px;
      height: 600px;
    }

    /* canvas must not have border or padding - mouse coords will be wrong */
    #canvas {
      border: 0px none;
      padding: 0;
      display: block;
      visibility: hidden;
    }
    #loadingCanvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }
    .game-border {
      display: inline-block;
      max-width: 100%;
    }

    .controls {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 10px;
      flex-wrap: wrap;
      padding: 0 16px;
    }
    .control-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
    }
    .key {
      background: #222;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 11px;
      color: #aaa;
    }

    .links {
      display: flex;
      gap: 14px;
      margin-top: 18px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 16px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #8888cc;
      text-decoration: none;
      font-size: 13px;
      padding: 8px 16px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .links a:hover {
      background: #1a1a3a;
      border-color: #5555aa;
      color: #aaaaee;
    }

    .footer {
      margin-top: auto;
      padding: 20px 16px;
      text-align: center;
      color: #444;
      font-size: 12px;
      width: 100%;
      border-top: 1px solid #1a1a2a;
    }
    .footer a { color: #666; text-decoration: none; }
    .footer a:hover { color: #999; }
    .icon-svg { width: 16px; height: 16px; fill: currentColor; }

    /* Mobile responsive */
    @media (max-width: 840px) {
      .game-wrapper {
        width: 100vw;
        height: calc(100vw * 0.75);
        max-width: 800px;
        max-height: 600px;
      }
      #loadingCanvas {
        width: 100% !important;
        height: 100% !important;
      }
      #canvas {
        width: 100% !important;
        height: 100% !important;
      }
      .header {
        padding: 16px 16px 8px;
      }
      .header img { width: 48px; height: 48px; }
      .header h1 { font-size: 24px; letter-spacing: 3px; }
      .header p { font-size: 12px; }
      .controls { display: none; }
      .links { gap: 8px; margin-top: 12px; }
      .links a { font-size: 12px; padding: 6px 12px; }
    }

    /* Landscape mobile: maximize game area */
    @media (max-height: 500px) and (orientation: landscape) {
      .header { display: none; }
      .controls { display: none; }
      .links { display: none; }
      .footer { display: none; }
      body { justify-content: center; }
      .game-wrapper {
        width: calc(100vh * 1.333);
        height: 100vh;
        max-width: 800px;
        max-height: 600px;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="icon.svg" alt="Gridlock" width="72" height="72">
    <h1>GRIDLOCK</h1>
    <p>A Parking Puzzle Game</p>
  </div>

  <div class="game-border">
    <div class="game-wrapper">
      <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()" width="800" height="600"></canvas>
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="control-item"><span class="key">Drag</span> Move car</div>
    <div class="control-item"><span class="key">H</span> Hint</div>
    <div class="control-item"><span class="key">U</span> Undo</div>
    <div class="control-item"><span class="key">R</span> Reset</div>
  </div>

  <div class="links">
    <a href="generator.html">
      <svg class="icon-svg" viewBox="0 0 16 16"><path d="M8 0a8 8 0 110 16A8 8 0 018 0zm.75 4.75a.75.75 0 00-1.5 0v2.5h-2.5a.75.75 0 000 1.5h2.5v2.5a.75.75 0 001.5 0v-2.5h2.5a.75.75 0 000-1.5h-2.5v-2.5z"/></svg>
      Level Generator
    </a>
    <a href="https://github.com/sejoung/gridlock">
      <svg class="icon-svg" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <a href="https://github.com/sejoung/gridlock/releases">
      <svg class="icon-svg" viewBox="0 0 16 16"><path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 010 2.474l-5.026 5.026a1.75 1.75 0 01-2.474 0l-6.25-6.25A1.752 1.752 0 011 7.775zM6 5a1 1 0 100-2 1 1 0 000 2z"/></svg>
      Download
    </a>
  </div>

  <div class="footer">
    <p>
      Built with <a href="https://love2d.org">Love2D</a>
      by <a href="https://github.com/sejoung">beni kim</a>
      &middot;
      <a href="https://github.com/sejoung/gridlock">Open Source (Apache 2.0)</a>
    </p>
  </div>

  <script type="text/javascript">
    window.onload = function () { window.focus(); };
    window.onclick = function () { window.focus(); };

    window.addEventListener("keydown", function(e) {
      if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
        e.preventDefault();
      }
    }, false);

    // Prevent touch gestures from scrolling/zooming the page
    document.addEventListener('touchmove', function(e) {
      if (e.target.tagName === 'CANVAS' || e.target.closest('.game-wrapper')) {
        e.preventDefault();
      }
    }, { passive: false });

    // Prevent double-tap zoom on game area
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300 && (e.target.tagName === 'CANVAS' || e.target.closest('.game-wrapper'))) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    var loadingContext = document.getElementById('loadingCanvas').getContext('2d');
    function drawLoadingText(text) {
      var canvas = loadingContext.canvas;
      loadingContext.fillStyle = '#0f0f1a';
      loadingContext.fillRect(0, 0, canvas.scrollWidth, canvas.scrollHeight);
      loadingContext.font = '18px -apple-system, sans-serif';
      loadingContext.textAlign = 'center';
      loadingContext.fillStyle = '#888';
      loadingContext.fillText(text, canvas.scrollWidth / 2, canvas.scrollHeight / 2);
    }

    var Module = {
      arguments: ['./game.love'],
      INITIAL_MEMORY: 16777216,
      printErr: console.error.bind(console),
      canvas: (function() {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function(e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function(text) {
        if (text) {
          drawLoadingText(text);
        } else if (Module.remainingDependencies === 0) {
          document.getElementById('loadingCanvas').style.display = 'none';
          document.getElementById('canvas').style.visibility = 'visible';
        }
      },
      totalDependencies: 0,
      remainingDependencies: 0,
      monitorRunDependencies: function(left) {
        this.remainingDependencies = left;
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
      }
    };
    Module.setStatus('Downloading...');

    window.onerror = function(event) {
      Module.setStatus('Exception thrown, see JavaScript console');
      Module.setStatus = function(text) {
        if (text) Module.printErr('[post-exception status] ' + text);
      };
    };

    var applicationLoad = function(e) {
      Love(Module);
    }
  </script>
  <script type="text/javascript" src="game.js"></script>
  <script async type="text/javascript" src="love.js" onload="applicationLoad(this)"></script>

</body>
</html>
